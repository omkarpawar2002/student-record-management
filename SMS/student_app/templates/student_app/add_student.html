{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}
<title>Add Student</title>
{% endblock title %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/add_stu.css' %}">
{% endblock css %}

{% block content %}
<div class="container">
    <h1>Add Student Details</h1>
    <form method="post">
        {% csrf_token %}
        {{form | crispy}}
        <button type="submit" class="btn btn-outline-dark col-5">Add Student</button>
        <button type="reset" class="btn btn-outline-dark col-5 float-end">Reset Student</button>
    </form>
</div>
{% endblock content %}
