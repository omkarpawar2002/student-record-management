{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}
<title>Update Student</title>
{% endblock title %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/add_stu.css' %}">
{% endblock css %}

{% block content %}
<div class="container">
    <h1>Update Student Details</h1>
    <form method="post">
        {% csrf_token %}
        {{form | crispy}}
        <button type="submit" class="btn btn-outline-dark col-5">Update Student</button>
        <a href="{% url 'Show_Student' %}"><button type="button" class="btn btn-outline-dark col-5 float-end">Cancel Student</button></a>
    </form>
</div>
{% endblock content %}
